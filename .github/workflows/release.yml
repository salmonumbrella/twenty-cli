name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          gh api repos/salmonumbrella/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f 'client_payload[repo]=salmonumbrella/twenty-cli' \
            -f 'client_payload[version]=${{ github.ref_name }}' \
            -f 'client_payload[binary_name]=twenty' \
            -f 'client_payload[formula_name]=twenty-cli' \
            -f 'client_payload[description]=CLI for Twenty CRM' \
            -f 'client_payload[archive_prefix]=twenty'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
