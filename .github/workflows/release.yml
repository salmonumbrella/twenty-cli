name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: End-to-end tests
        run: pnpm test:e2e

      - name: Lint, format, and typecheck
        run: pnpm exec prek run --all-files

  live-smoke:
    needs: verify
    uses: ./.github/workflows/live-smoke.yml
    with:
      base_url: ${{ vars.TWENTY_LIVE_BASE_URL }}
      workspace: ${{ vars.TWENTY_LIVE_WORKSPACE }}
    secrets: inherit
    permissions:
      contents: read

  build-release:
    needs: [verify, live-smoke]
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
            targets: linux-x64,linux-arm64
            artifact_name: release-linux
          - runner: macos-14
            platform: darwin
            arch: arm64
            targets: macos-arm64,macos-x64
            artifact_name: release-macos
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rosetta for cross-packaging
        if: runner.os == 'macOS'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Build release archives
        run: pnpm release:build -- --version "${GITHUB_REF_NAME#v}" --targets "${{ matrix.targets }}"

      - name: Smoke native release archive
        run: node scripts/smoke-release-artifact.mjs --release-dir dist/release --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}"

      - name: Upload release archives
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/release/twenty_*.tar.gz

  release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist/release
          merge-multiple: true

      - name: Write release metadata
        run: pnpm release:metadata -- --tag "${GITHUB_REF_NAME}" --output-dir dist/release

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/release/twenty_*.tar.gz \
              dist/release/checksums.txt \
              dist/release/release-metadata.json \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/release/twenty_*.tar.gz \
              dist/release/checksums.txt \
              dist/release/release-metadata.json \
              --generate-notes
          fi

      - name: Update Homebrew formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          gh api repos/${{ github.repository_owner }}/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f 'client_payload[repo]=${{ github.repository }}' \
            -f 'client_payload[version]=${{ github.ref_name }}' \
            -f 'client_payload[binary_name]=twenty' \
            -f 'client_payload[formula_name]=twenty-cli' \
            -f 'client_payload[description]=CLI for Twenty CRM' \
            -f 'client_payload[archive_prefix]=twenty'
        env:
          GH_TOKEN: ${{ env.HOMEBREW_TAP_TOKEN }}
