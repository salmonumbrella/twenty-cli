name: Live Smoke

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      base_url:
        description: Base URL for the live environment
        required: true
        type: string
      workspace:
        description: Workspace profile for the live environment
        required: true
        type: string
    secrets:
      TWENTY_LIVE_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    environment: live-smoke
    env:
      TWENTY_TOKEN: ${{ secrets.TWENTY_LIVE_TOKEN }}
      TWENTY_BASE_URL: ${{ inputs.base_url || vars.TWENTY_LIVE_BASE_URL }}
      TWENTY_PROFILE: ${{ inputs.workspace || vars.TWENTY_LIVE_WORKSPACE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run live smoke tests
        run: pnpm test:smoke:live
